<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Card Image Debug</title>
  <style>
    body { background:#111; color:#fff; font-family:sans-serif; padding:2rem; display:flex; flex-direction:column; gap:2rem; }
    .row { display:flex; gap:2rem; flex-wrap:wrap; align-items:flex-start; }
    .box { display:flex; flex-direction:column; gap:0.5rem; }
    label { font-size:0.7rem; color:#555; text-transform:uppercase; letter-spacing:0.1em; }
    canvas { border:1px solid #333; border-radius:4px; }
    #stats { font-size:0.75rem; color:#aaa; line-height:2; }
    .swatch { display:inline-block; width:16px; height:16px; border:1px solid #444; vertical-align:middle; margin-right:6px; }
  </style>
</head>
<body>
<h2 style="font-size:1rem;letter-spacing:0.2em;color:#00d4ff">CARD IMAGE DEBUG</h2>
<div id="stats">Generating...</div>
<div class="row">
  <div class="box"><label>Raw canvas (before quantize)</label><canvas id="raw" width="400" height="600" style="width:200px;height:300px"></canvas></div>
  <div class="box"><label>After quantize</label><canvas id="quantized" width="400" height="600" style="width:200px;height:300px"></canvas></div>
  <div class="box"><label>Unique colors found</label><div id="colors" style="margin-top:8px"></div></div>
</div>

<script>
const PALETTE = [
  [0,0,0,'black'],
  [255,255,255,'white'],
  [255,0,0,'red'],
  [0,255,0,'green'],
  [0,0,255,'blue'],
  [255,255,0,'yellow'],
];

function nearestPalette(r,g,b) {
  let minD=Infinity, best=PALETTE[0];
  for(const p of PALETTE) {
    const d=(r-p[0])**2+(g-p[1])**2+(b-p[2])**2;
    if(d<minD){minD=d;best=p;}
  }
  return best;
}

function drawBaroque(canvas) {
  const ctx = canvas.getContext('2d');
  const W=400,H=600,cx=200,cy=300;

  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,10); ctx.fillRect(0,H-10,W,10);
  ctx.fillRect(0,0,10,H); ctx.fillRect(W-10,0,10,H);
  ctx.fillRect(16,16,W-32,2); ctx.fillRect(16,H-18,W-32,2);
  ctx.fillRect(16,16,2,H-32); ctx.fillRect(W-18,16,2,H-32);

  function aLeaf(x,y,angle,size,curl){
    const c=curl||0.5,s=size;
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.bezierCurveTo(-s*c,-s*0.3,-s*(c+0.15),-s*0.7,-s*0.1,-s*0.95);
    ctx.bezierCurveTo(s*0.1,-s*1.05,s*0.25,-s*0.9,s*0.2,-s*0.7);
    ctx.bezierCurveTo(s*0.15,-s*0.5,s*0.05,-s*0.35,0,0); ctx.stroke();
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(-s*0.1,-s*0.95);
    ctx.bezierCurveTo(-s*0.3,-s*1.1,-s*0.5,-s*1.0,-s*0.45,-s*0.8);
    ctx.bezierCurveTo(-s*0.4,-s*0.65,-s*0.2,-s*0.6,-s*0.1,-s*0.7); ctx.stroke();
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,-s*0.2);
    ctx.bezierCurveTo(s*0.15,-s*0.35,s*0.3,-s*0.25,s*0.25,-s*0.1);
    ctx.bezierCurveTo(s*0.2,0,s*0.08,0.05,0,0); ctx.stroke();
    ctx.restore();
  }

  function sUnit(x,y,angle,size){
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-size*0.5);
    ctx.bezierCurveTo(size*0.4,-size*0.3,size*0.4,size*0.3,0,size*0.5); ctx.stroke();
    aLeaf(size*0.15,-size*0.1,-0.4,size*0.55);
    aLeaf(-size*0.15,size*0.1,Math.PI+0.4,size*0.55);
    ctx.restore();
  }

  const margin=28,tileW=48,tileH=48;
  for(let row=0;row*tileH<H-margin*1.5;row++){
    for(let col=0;col*tileW<W-margin*1.5;col++){
      const x=margin+col*tileW+(row%2===0?0:tileW*0.5),y=margin+row*tileH;
      if(x<margin-4||x>W-margin+4||y<margin-4||y>H-margin+4) continue;
      const dx=x-cx,dy=y-cy;
      if(Math.abs(dx)<85&&Math.abs(dy)<85) continue;
      sUnit(x,y,(row+col)%2===0?0:Math.PI/2,tileW*0.9);
    }
  }

  const dH=72,dW=46;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(cx,cy-dH); ctx.lineTo(cx+dW,cy); ctx.lineTo(cx,cy+dH); ctx.lineTo(cx-dW,cy); ctx.closePath(); ctx.stroke();
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx,cy-dH+8); ctx.lineTo(cx+dW-8,cy); ctx.lineTo(cx,cy+dH-8); ctx.lineTo(cx-dW+8,cy); ctx.closePath(); ctx.stroke();
  [[cx,cy-dH,-Math.PI/2],[cx+dW,cy,0],[cx,cy+dH,Math.PI/2],[cx-dW,cy,Math.PI]].forEach(([x,y,a])=>aLeaf(x,y,a,12,0.4));

  const letters=['T','O','M','E'],sp=(dH*2-28)/4,startY=cy-(3*sp/2);
  ctx.fillStyle='#ffffff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 20px Georgia,serif';
  letters.forEach((l,i)=>ctx.fillText(l,cx,startY+i*sp));
}

// Draw raw
const raw = document.getElementById('raw');
drawBaroque(raw);

// Analyze raw pixel colors
const rawCtx = raw.getContext('2d');
const rawData = rawCtx.getImageData(0,0,400,600).data;
const rawColors = {};
for(let i=0;i<rawData.length;i+=4){
  const key=`${rawData[i]},${rawData[i+1]},${rawData[i+2]}`;
  rawColors[key]=(rawColors[key]||0)+1;
}
const sortedRaw = Object.entries(rawColors).sort((a,b)=>b[1]-a[1]).slice(0,10);

// Quantize to palette
const qCanvas = document.getElementById('quantized');
drawBaroque(qCanvas);
const qCtx = qCanvas.getContext('2d');
const imgData = qCtx.getImageData(0,0,400,600);
const d = imgData.data;
const qColors = {};
for(let i=0;i<d.length;i+=4){
  const best=nearestPalette(d[i],d[i+1],d[i+2]);
  d[i]=best[0]; d[i+1]=best[1]; d[i+2]=best[2]; d[i+3]=255;
  const key=best[3];
  qColors[key]=(qColors[key]||0)+1;
}
qCtx.putImageData(imgData,0,0);

// Show stats
const stats = document.getElementById('stats');
stats.innerHTML = `<b>Raw canvas — top 10 unique colors (before quantize):</b><br>` +
  sortedRaw.map(([k,v])=>{
    const [r,g,b]=k.split(',');
    const nearest=nearestPalette(+r,+g,+b);
    return `<span class="swatch" style="background:rgb(${k})"></span> rgb(${k}) — ${v.toLocaleString()} pixels → maps to <b>${nearest[3]}</b>`;
  }).join('<br>') +
  `<br><br><b>After quantize — palette breakdown:</b><br>` +
  Object.entries(qColors).map(([k,v])=>{
    const p=PALETTE.find(p=>p[3]===k);
    return `<span class="swatch" style="background:rgb(${p[0]},${p[1]},${p[2]})"></span> ${k}: ${v.toLocaleString()} pixels (${(v/240000*100).toFixed(1)}%)`;
  }).join('<br>');

// Show color list
const colDiv = document.getElementById('colors');
Object.entries(qColors).forEach(([k,v])=>{
  const p=PALETTE.find(p=>p[3]===k);
  const row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:0.8rem';
  row.innerHTML=`<div style="width:24px;height:24px;background:rgb(${p[0]},${p[1]},${p[2]});border:1px solid #444;border-radius:3px"></div><span>${k}: ${(v/240000*100).toFixed(1)}%</span>`;
  colDiv.appendChild(row);
});
</script>
</body>
</html>
